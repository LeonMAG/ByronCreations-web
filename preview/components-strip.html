<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0d0d0d; font-family: 'DM Sans', sans-serif; }

.strip {
  position: relative;
  width: 100%;
  height: 160px;
  display: flex;
  align-items: center;
  overflow: hidden;
}
.strip-bg {
  position: absolute; inset: 0;
  background: linear-gradient(135deg, #0e1218, #1a2030);
}
.strip-bg::after {
  content: '';
  position: absolute; inset: 0;
  background: rgba(0,0,0,0.55);
}
.strip-content {
  position: relative; z-index: 1;
  display: grid; grid-template-columns: 1fr 1fr;
  width: 100%; padding: 0 40px; gap: 40px; align-items: center;
}
.strip-media {
  display: flex; gap: 8px;
}
.media-thumb {
  width: 80px; height: 80px; border-radius: 4px;
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.08);
  flex-shrink: 0;
}
.strip-text {}
.strip-label { font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: #b89a30; margin-bottom: 6px; }
.strip-title { font-family: 'Raleway', sans-serif; font-size: 22px; font-weight: 500; color: #F2F2F2; line-height: 1.2; margin-bottom: 6px; }
.strip-desc { font-size: 13px; color: #888; line-height: 1.5; }

/* Second strip - flipped layout */
.strip2 { background: linear-gradient(135deg, #120e18, #201828); }
</style>
</head>
<body>
<div class="strip">
  <div class="strip-bg"></div>
  <div class="strip-content">
    <div class="strip-media">
      <div class="media-thumb"></div>
      <div class="media-thumb" style="opacity:0.6;"></div>
      <div class="media-thumb" style="opacity:0.4;"></div>
    </div>
    <div class="strip-text">
      <div class="strip-label">Sala de grabación · Mar 2024</div>
      <div class="strip-title">Sesión con Artista A</div>
      <div class="strip-desc">Tres días en el estudio grabando las bases del nuevo álbum.</div>
    </div>
  </div>
</div>
<div class="strip" style="margin-top:4px;">
  <div class="strip-bg strip2" style="background:linear-gradient(135deg,#120e18,#201828);"></div>
  <div class="strip-content" style="direction:rtl;">
    <div class="strip-media" style="direction:ltr;">
      <div class="media-thumb" style="background:rgba(200,169,110,0.06);"></div>
      <div class="media-thumb" style="opacity:0.5; background:rgba(200,169,110,0.04);"></div>
    </div>
    <div class="strip-text" style="direction:ltr; text-align:right;">
      <div class="strip-label">Concierto · Jun 2024</div>
      <div class="strip-title">Festival de verano</div>
      <div class="strip-desc">Primera actuación en formato acústico.</div>
    </div>
  </div>
</div>
</body>
</html>
