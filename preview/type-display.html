<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
@font-face {
  font-family: 'Raleway';
  src: url('../fonts/Raleway-VariableFont_wght.ttf') format('truetype');
  font-weight: 100 900; font-style: normal; font-display: swap;
}
@font-face {
  font-family: 'Raleway';
  src: url('../fonts/Raleway-Italic-VariableFont_wght.ttf') format('truetype');
  font-weight: 100 900; font-style: italic; font-display: swap;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #070d09; padding: 28px 28px 20px; }
.specimen { margin-bottom: 18px; border-bottom: 1px solid rgba(255,255,255,0.06); padding-bottom: 18px; }
.specimen:last-child { border-bottom: none; margin-bottom: 0; }
.tag { font-family: 'DM Mono', monospace; font-size: 10px; color: #525252; letter-spacing: 0.06em; margin-bottom: 5px; }
</style>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300&display=swap" rel="stylesheet">
</head>
<body>

<div class="specimen">
  <div class="tag">Raleway · 700 · Hero</div>
  <div style="font-family:'Raleway',sans-serif; font-size:64px; font-weight:700; letter-spacing:-0.03em; line-height:1.0; color:#F2F2F2;">Byron Creations</div>
</div>

<div class="specimen">
  <div class="tag">Raleway · 300 · H1 — elegant thin</div>
  <div style="font-family:'Raleway',sans-serif; font-size:44px; font-weight:300; letter-spacing:0.06em; line-height:1.1; color:#F2F2F2;">Músico &amp; Productor</div>
</div>

<div class="specimen">
  <div class="tag">Raleway · 500 · H2 accent</div>
  <div style="font-family:'Raleway',sans-serif; font-size:30px; font-weight:500; letter-spacing:0.02em; line-height:1.2; color:#b89a30;">Portfolio de producción</div>
</div>

<div class="specimen">
  <div class="tag">Raleway · 200 · Italic display statement</div>
  <div style="font-family:'Raleway',sans-serif; font-size:52px; font-weight:200; font-style:italic; letter-spacing:0.04em; line-height:1.0; color:#F2F2F2; opacity:0.85;">Música</div>
</div>

</body>
</html>
