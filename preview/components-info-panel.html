<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bc-bg-base); font-family: 'DM Sans', sans-serif; }

.panel {
  background: rgba(12,12,12,0.96);
  backdrop-filter: blur(24px) saturate(180%);
  border-top: 2px solid rgba(200,169,110,0.5);
  border-bottom: 1px solid rgba(255,255,255,0.08);
  padding: 20px 24px;
  animation: expandIn 500ms cubic-bezier(0.4,0,0.2,1) forwards;
}
@keyframes expandIn {
  from { opacity:0; max-height:0; transform: translateY(-8px); }
  to   { opacity:1; max-height:400px; transform: translateY(0); }
}

.panel-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
.panel-title { font-family: 'Raleway', sans-serif; font-size: 26px; font-weight: 500; color: #F2F2F2; }
.panel-sub { font-size: 13px; color: #888; margin-top: 2px; }
.close-btn { width: 28px; height: 28px; border-radius: 50%; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1); color: #888; display: flex; align-items: center; justify-content: center; font-size: 12px; cursor: pointer; flex-shrink: 0; }

.panel-body { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }
.panel-col-label { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: #555; margin-bottom: 6px; }
.panel-col-value { font-size: 14px; color: #888; line-height: 1.5; }

.platforms { display: flex; gap: 8px; margin-top: 8px; }
.platform-pill { padding: 4px 10px; border-radius: 100px; font-size: 10px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; background: rgba(255,255,255,0.06); color: #888; border: 1px solid rgba(255,255,255,0.10); }
</style>
</head>
<body>
<div class="panel">
  <div class="panel-header">
    <div>
      <div class="panel-title">Nombre del tema</div>
      <div class="panel-sub">Feat. Artista Colaborador · 2024</div>
    </div>
    <div class="close-btn">✕</div>
  </div>
  <div class="panel-body">
    <div>
      <div class="panel-col-label">Historia</div>
      <div class="panel-col-value">Esta canción nació de una sesión nocturna en el estudio, explorando texturas sonoras nuevas...</div>
    </div>
    <div>
      <div class="panel-col-label">Artistas</div>
      <div class="panel-col-value">Byron · Artista A · Artista B</div>
      <div class="panel-col-label" style="margin-top:10px;">Duración</div>
      <div class="panel-col-value">3:42</div>
    </div>
    <div>
      <div class="panel-col-label">Plataformas</div>
      <div class="platforms">
        <span class="platform-pill">Spotify</span>
        <span class="platform-pill">Apple</span>
      </div>
      <div class="platforms" style="margin-top:6px;">
        <span class="platform-pill">YouTube</span>
      </div>
    </div>
  </div>
</div>
</body>
</html>
