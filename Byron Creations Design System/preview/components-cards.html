<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bc-bg-base); padding: 24px; font-family: 'DM Sans', sans-serif; }
.section-label { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: #555; margin-bottom: 14px; }
.row { display: flex; gap: 16px; align-items: flex-start; margin-bottom: 20px; }

/* Album card */
.album-card { position: relative; width: 100px; height: 100px; border-radius: 4px; overflow: hidden; box-shadow: 0 8px 32px rgba(0,0,0,0.6); cursor: pointer; flex-shrink: 0; }
.album-card .art { width: 100%; height: 100%; background: linear-gradient(135deg, #1a1a1a, #2a2218); display: flex; align-items: center; justify-content: center; }
.album-card .overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.55); display: flex; align-items: center; justify-content: center; gap: 8px; opacity: 0; transition: opacity 200ms ease; }
.album-card:hover .overlay { opacity: 1; }
.album-card:hover .art { transform: scale(1.03); }
.play-btn { width: 32px; height: 32px; border-radius: 50%; background: rgba(200,169,110,0.9); display: flex; align-items: center; justify-content: center; font-size: 11px; color: #080808; }

/* Glass card */
.glass-card { background: rgba(255,255,255,0.06); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.10); border-radius: 8px; padding: 16px; width: 200px; }
.glass-card .title { font-family: 'Raleway', sans-serif; font-size: 18px; font-weight: 500; color: #F2F2F2; margin-bottom: 4px; }
.glass-card .sub { font-size: 12px; color: #888; }
.glass-card .meta { font-size: 11px; color: #555; margin-top: 10px; letter-spacing: 0.04em; }
</style>
</head>
<body>
<div class="section-label">Album Cover Cards</div>
<div class="row">
  <div class="album-card"><div class="art"><div style="width:60%;height:60%;border:1px solid rgba(200,169,110,0.3);border-radius:2px;"></div></div><div class="overlay"><div class="play-btn">▶</div></div></div>
  <div class="album-card"><div class="art" style="background:linear-gradient(135deg,#181420,#2a1a28);"></div><div class="overlay"><div class="play-btn">▶</div></div></div>
  <div class="album-card"><div class="art" style="background:linear-gradient(135deg,#0d1a1a,#182820);"></div><div class="overlay"><div class="play-btn">▶</div></div></div>
</div>
<div class="section-label">Glass Info Card</div>
<div class="row">
  <div class="glass-card">
    <div class="title">Nombre del tema</div>
    <div class="sub">Artista colaborador</div>
    <div class="meta">2024 · Producción propia · 3:42</div>
  </div>
  <div class="glass-card" style="border-top: 2px solid rgba(200,169,110,0.5);">
    <div class="title" style="color:#b89a30;">Destacado</div>
    <div class="sub">Historia detrás de la canción</div>
    <div class="meta">Plataformas · Letra · Info</div>
  </div>
</div>
</body>
</html>
