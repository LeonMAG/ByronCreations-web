<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
@font-face {
  font-family: 'Raleway';
  src: url('../fonts/Raleway-VariableFont_wght.ttf') format('truetype');
  font-weight: 100 900; font-style: normal; font-display: swap;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #070d09; padding: 24px; }
.scale { display: flex; flex-direction: column; gap: 6px; }
.row { display: flex; align-items: baseline; gap: 16px; border-bottom: 1px solid rgba(255,255,255,0.04); padding-bottom: 6px; }
.label { font-family: 'DM Mono', monospace; font-size: 10px; color: #444; min-width: 120px; }
</style>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=DM+Mono:wght@300&display=swap" rel="stylesheet">
</head>
<body>
<div class="scale">
  <div class="row"><div class="label">hero · 700</div><div style="font-family:'Raleway';font-size:50px;font-weight:700;letter-spacing:-0.02em;color:#F2F2F2;line-height:1;">Byron</div></div>
  <div class="row"><div class="label">h1 · 300 wide</div><div style="font-family:'Raleway';font-size:36px;font-weight:300;letter-spacing:0.06em;color:#F2F2F2;line-height:1.05;">Músico &amp; Productor</div></div>
  <div class="row"><div class="label">h2 · 500</div><div style="font-family:'Raleway';font-size:26px;font-weight:500;letter-spacing:0.02em;color:#F2F2F2;">Portfolio Musical</div></div>
  <div class="row"><div class="label">h3 · accent</div><div style="font-family:'Raleway';font-size:20px;font-weight:400;letter-spacing:0.02em;color:#b89a30;">Galería de Actividad</div></div>
  <div class="row"><div class="label">body-lg · 18px</div><div style="font-family:'DM Sans',sans-serif;font-size:16px;font-weight:300;color:#8A8A8A;line-height:1.5;">Producciones cuidadosamente trabajadas</div></div>
  <div class="row"><div class="label">body · 16px</div><div style="font-family:'DM Sans',sans-serif;font-size:14px;font-weight:400;color:#8A8A8A;">Historia detrás de la canción</div></div>
  <div class="row"><div class="label">label · 11px</div><div style="font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;letter-spacing:0.14em;text-transform:uppercase;color:#525252;">Portfolio · Conciertos</div></div>
</div>
</body>
</html>
