<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #070d09; display: flex; align-items: center; justify-content: center; min-height: 150px; font-family: 'DM Sans', sans-serif; }
.logo-wrap { display: flex; flex-direction: column; align-items: center; gap: 20px; }
.wordmark { font-family: 'Raleway', sans-serif; font-size: 48px; font-weight: 500; letter-spacing: -0.02em; color: #F2F2F2; }
.wordmark span { color: #b89a30; }
.tagline { font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: #555; }
</style>
</head>
<body>
<div class="logo-wrap">
  <div class="wordmark">Byron <span>Creations</span></div>
  <div class="tagline">Músico · Productor · Artista</div>
</div>
</body>
</html>
