<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500&family=DM+Mono:wght@300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bc-bg-base); padding: 24px; font-family: 'DM Sans', sans-serif; }
.section-label { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: #555; margin-bottom: 12px; }
.row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; align-items: flex-end; }
.swatch { display: flex; flex-direction: column; gap: 6px; align-items: center; }
.name { font-family: 'DM Mono',monospace; font-size: 10px; color: #555; }

/* Radii demos */
.r-chip { width: 60px; height: 40px; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12); }

/* Shadow demos */
.s-box { width: 64px; height: 40px; background: #191919; display: flex; align-items: center; justify-content: center; border-radius: 6px; }
</style>
</head>
<body>
<div class="section-label">Border Radii</div>
<div class="row">
  <div class="swatch"><div class="r-chip" style="border-radius:0px;"></div><div class="name">none / 0</div></div>
  <div class="swatch"><div class="r-chip" style="border-radius:2px;"></div><div class="name">xs / 2px</div></div>
  <div class="swatch"><div class="r-chip" style="border-radius:4px;"></div><div class="name">sm / 4px</div></div>
  <div class="swatch"><div class="r-chip" style="border-radius:6px;"></div><div class="name">md / 6px</div></div>
  <div class="swatch"><div class="r-chip" style="border-radius:8px;"></div><div class="name">lg / 8px</div></div>
  <div class="swatch"><div class="r-chip" style="border-radius:12px;"></div><div class="name">xl / 12px</div></div>
  <div class="swatch"><div class="r-chip" style="border-radius:100px; width:80px;"></div><div class="name">pill</div></div>
</div>
<div class="section-label">Shadows</div>
<div class="row">
  <div class="swatch"><div class="s-box" style="box-shadow:0 2px 8px rgba(0,0,0,0.40);"></div><div class="name">shadow-sm</div></div>
  <div class="swatch"><div class="s-box" style="box-shadow:0 8px 32px rgba(0,0,0,0.60);"></div><div class="name">shadow-md</div></div>
  <div class="swatch"><div class="s-box" style="box-shadow:0 24px 64px rgba(0,0,0,0.80);"></div><div class="name">shadow-lg</div></div>
  <div class="swatch"><div class="s-box" style="box-shadow:0 0 40px rgba(200,169,110,0.18);border:1px solid rgba(200,169,110,0.2);"></div><div class="name">shadow-glow</div></div>
</div>
</body>
</html>
