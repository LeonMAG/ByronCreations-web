<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bc-bg-base); font-family: 'DM Sans', sans-serif; }

/* Grid */
.grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; padding: 20px; }
.album { position: relative; aspect-ratio: 1; border-radius: 4px; overflow: hidden; cursor: pointer; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
.album .art { width: 100%; height: 100%; transition: transform 300ms cubic-bezier(0.25,0.46,0.45,0.94); }
.album:hover .art { transform: scale(1.05); }
.album .hover-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.55); opacity: 0; transition: opacity 200ms ease; display: flex; align-items: center; justify-content: center; gap: 6px; }
.album:hover .hover-overlay { opacity: 1; }
.play-btn { width: 28px; height: 28px; border-radius: 50%; background: #C8A96E; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #080808; }
.info-btn { width: 20px; height: 20px; border-radius: 50%; background: rgba(255,255,255,0.15); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; font-size: 9px; color: #fff; border: 1px solid rgba(255,255,255,0.3); }

/* Colors for placeholder album arts */
.a1 { background: linear-gradient(135deg,#1a1a14,#2e2510); }
.a2 { background: linear-gradient(135deg,#14141e,#1e1428); }
.a3 { background: linear-gradient(135deg,#0e1a14,#1a2e1e); }
.a4 { background: linear-gradient(135deg,#1a1014,#2e1418); }
.a5 { background: linear-gradient(135deg,#181418,#2a1e2a); }
</style>
</head>
<body>
<div class="grid">
  <div class="album"><div class="art a1"></div><div class="hover-overlay"><div class="play-btn">▶</div><div class="info-btn">i</div></div></div>
  <div class="album"><div class="art a2"></div><div class="hover-overlay"><div class="play-btn">▶</div><div class="info-btn">i</div></div></div>
  <div class="album"><div class="art a3"></div><div class="hover-overlay"><div class="play-btn">▶</div><div class="info-btn">i</div></div></div>
  <div class="album"><div class="art a4"></div><div class="hover-overlay"><div class="play-btn">▶</div><div class="info-btn">i</div></div></div>
  <div class="album"><div class="art a5"></div><div class="hover-overlay"><div class="play-btn">▶</div><div class="info-btn">i</div></div></div>
</div>
</body>
</html>
