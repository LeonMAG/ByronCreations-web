<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #070d09; padding: 24px; font-family: 'DM Sans', sans-serif; }
.section-label { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: #555; margin-bottom: 14px; }
.row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; margin-bottom: 20px; }

button {
  display: inline-flex; align-items: center; justify-content: center;
  font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 500;
  letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer;
  transition: all 150ms ease; padding: 11px 24px; border-radius: 6px;
}
.btn-primary { background: #b89a30; color: #0a0a0a; border: none; }
.btn-primary:hover { opacity: 0.85; }
.btn-ghost { background: transparent; color: #F2F2F2; border: 1px solid rgba(255,255,255,0.12); }
.btn-ghost:hover { border-color: rgba(255,255,255,0.25); background: rgba(255,255,255,0.05); }
.btn-accent-outline { background: transparent; color: #b89a30; border: 1px solid rgba(184,154,48,0.35); }
.btn-accent-outline:hover { background: rgba(184,154,48,0.08); }
.btn-icon { background: rgba(255,255,255,0.06); color: #F0F0F0; border: 1px solid rgba(255,255,255,0.10); border-radius: 50%; width: 44px; height: 44px; padding: 0; font-size: 16px; }

.pill { display: inline-flex; align-items: center; padding: 4px 12px; border-radius: 100px; font-size: 11px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; }
.pill-gold { background: rgba(184,154,48,0.15); color: #b89a30; border: 1px solid rgba(184,154,48,0.28); }
.pill-neutral { background: rgba(255,255,255,0.05); color: #8A8A8A; border: 1px solid rgba(255,255,255,0.09); }
</style>
</head>
<body>
<div class="section-label">Buttons</div>
<div class="row">
  <button class="btn-primary">Escucha</button>
  <button class="btn-ghost">Ver más</button>
  <button class="btn-accent-outline">Portfolio</button>
  <button class="btn-icon">▶</button>
</div>
<div class="section-label">Badges / Pills</div>
<div class="row">
  <span class="pill pill-gold">Producción propia</span>
  <span class="pill pill-neutral">2024</span>
  <span class="pill pill-neutral">Colaboración</span>
  <span class="pill pill-gold">Nuevo</span>
</div>
</body>
</html>
