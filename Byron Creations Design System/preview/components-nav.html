<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300&family=DM+Sans:opsz,wght@9..40,400;9..40,500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #070d09; font-family: 'DM Sans', sans-serif; }

.nav { display: flex; align-items: center; justify-content: space-between; padding: 0 32px; height: 64px; background: rgba(7,13,9,0.88); backdrop-filter: blur(20px) saturate(180%); border-bottom: 1px solid rgba(255,255,255,0.07); }
.nav-logo { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 300; color: #F0F0F0; letter-spacing: -0.01em; }
.nav-logo span { color: #b89a30; }
.nav-links { display: flex; gap: 32px; }
.nav-link { font-size: 11px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: #888; text-decoration: none; transition: color 150ms; }
.nav-link:hover, .nav-link.active { color: #b89a30; }
.nav-cta { font-size: 11px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: #0a0a0a; background: #b89a30; padding: 8px 18px; border-radius: 6px; text-decoration: none; }

/* Scrolled state */
.nav-scrolled { background: rgba(8,8,8,0.96); border-bottom: 1px solid rgba(255,255,255,0.12); }
</style>
</head>
<body>
<nav class="nav">
  <div class="nav-logo">Byron <span>Creations</span></div>
  <div class="nav-links">
    <a class="nav-link active" href="#">Portfolio</a>
    <a class="nav-link" href="#">Conciertos</a>
    <a class="nav-link" href="#">Galería</a>
    <a class="nav-link" href="#">Contacto</a>
  </div>
  <a class="nav-cta" href="#">Escucha</a>
</nav>
<nav class="nav nav-scrolled" style="margin-top: 12px;">
  <div class="nav-logo">Byron <span>Creations</span></div>
  <div class="nav-links">
    <a class="nav-link" href="#">Portfolio</a>
    <a class="nav-link active" href="#">Conciertos</a>
    <a class="nav-link" href="#">Galería</a>
    <a class="nav-link" href="#">Contacto</div>
  </div>
  <a class="nav-cta" href="#">Escucha</a>
</nav>
</body>
</html>
